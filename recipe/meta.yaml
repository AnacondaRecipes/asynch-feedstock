{% set name = "asynch" %}
{% set version = "0.3.1" %}

package:
  name: {{ name }}
  version: {{ version }}

source:
  url: https://github.com/long2ice/{{ name }}/archive/refs/tags/v{{ version }}.tar.gz
  sha256: 08751ce97f7e1fa7c7fd038627dae1c0ec706aedd396d5ecd71d3b3b094c0955

build:
  number: 0
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  skip: True  # [py<38]

requirements:
  host:
    - python
    - pip
    - poetry-core >=2.0.0,<3.0.0
  run:
    - python
    - ciso8601 >=2.3.2,<3.0.0
    - leb128 >=1.0.8,<2.0.0
    - lz4 >=4.4.3,<5.0.0
    - pytz >=2025.1,<2026.0
    - tzlocal >=5.3.1,<6.0.0
    - python-zstd >=1.5.6.6,<2.0.0.0

test:
  source_files:
    - tests
  imports:
    - asynch
    - asynch.proto
    - asynch.proto.columns
    - asynch.proto.compression
    - asynch.proto.settings
    - asynch.proto.streams
    - asynch.proto.utils
  commands:
    - pip check
  requires:
    - pip
    - pytest

about:
  home: https://github.com/long2ice/asynch
  summary: An asyncio ClickHouse Python Driver with native (TCP) interface support.
  description: |
    asynch is an asynchronous ClickHouse Python driver with native TCP interface support,
    which reuses most of clickhouse-driver features and complies with PEP249.
  license: Apache-2.0
  license_family: Apache
  license_file: LICENSE
  dev_url: https://github.com/long2ice/asynch
  doc_url: https://github.com/long2ice/asynch/blob/dev/README.md

extra:
  recipe-maintainers:
    - Jrice1317
