{% set name = "asynch" %}
{% set version = "0.3.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.tar.gz
  sha256: 5806b3df6b7ed998a427c718c7d3be73f498f234d11e3aa5b5dd50577db94516

build:
  number: 0
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  skip: true  # [py<39]

requirements:
  host:
    - python
    - pip
    - poetry-core
  run:
    - python
    - leb128 >=1.0.8,<2.0.0
    - pytz >=2025.1,<2026.0
    - lz4 >=4.4.3,<5.0.0
    - python-zstd
    - tzlocal >=5.3.1,<6.0.0
    - ciso8601 >=2.3.2,<3.0.0
    - zstd >=1.5.6.6,<2.0.0.0

test:
  imports:
    - asynch
    - asynch.proto
    - asynch.proto.columns
    - asynch.proto.compression
    - asynch.proto.settings
    - asynch.proto.streams
    - asynch.proto.utils
  requires:
    - pip
  commands:
    - pip check

about:
  home: https://github.com/long2ice/asynch
  summary: An asyncio ClickHouse Python Driver with native (TCP) interface support.
  description: |
    asynch is an asynchronous ClickHouse Python driver with native TCP interface support,
    which reuses most of clickhouse-driver features and complies with PEP249.
  license: Apache-2.0
  license_family: Apache
  license_file: LICENSE
  dev_url: https://github.com/long2ice/asynch
  doc_url: https://github.com/long2ice/asynch

extra:
  recipe-maintainers:
    - Jrice1317
